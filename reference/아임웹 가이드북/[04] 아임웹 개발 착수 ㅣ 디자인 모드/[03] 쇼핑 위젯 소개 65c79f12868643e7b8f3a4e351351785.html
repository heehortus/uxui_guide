</p></div><div style="display:contents" dir="ltr"><figure id="b3104a58-0f51-4caf-be80-15a1fb5b8138" class="image"><a href="%5B03%5D%20%EC%87%BC%ED%95%91%20%EC%9C%84%EC%A0%AF%20%EC%86%8C%EA%B0%9C/Untitled%202.png"><img style="width:681.984375px" src="%5B03%5D%20%EC%87%BC%ED%95%91%20%EC%9C%84%EC%A0%AF%20%EC%86%8C%EA%B0%9C/Untitled%202.png"/></a></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="ae03446f-6bfe-4b03-b068-70bd69175e92"><div style="font-size:1.5em"><span class="icon">📌</span></div><div style="width:100%">아임웹은 상품의 상태에 따라 다양한 뱃지를 상품 목록 등에서 표시하고 있습니다.<div style="display:contents" dir="auto"><p id="31a21116-d7e3-4362-bc8e-0b15daee0920" class="">단, SALE 뱃지는 상품 판매가보다 할인 이전 가격이 더 큰 경우 자동으로 노출됩니다. </p></div><div style="display:contents" dir="auto"><p id="9800cd70-d934-4f31-acb9-ab2be6f8f992" class=""><strong>다른 뱃지는 표시하고 SALE 뱃지만 감추고 싶을 때</strong> 코드를 사용하여 숨길 수 있습니다.</p></div><div style="display:contents" dir="ltr"><figure id="e37389ab-eb21-4520-b27d-2f8f4aa0fd89"><a href="https://imweb.me/faq?mode=view&amp;category=29&amp;category2=38&amp;idx=71190" class="bookmark source"><div class="bookmark-info"><div class="bookmark-text"><div class="bookmark-title">쇼핑 위젯, 기획전 위젯 등에서 SALE(세일) 뱃지/버튼 감추기 (코드, 초급)</div><div class="bookmark-description">중요: 아임웹에서 제공하지 않는 기능을 코드로 해결하는 도움말입니다. 향후 아임웹의 기능 업데이트 등의 변화에 따라 본 도움말에서 안내된 코드가 적용되지 않을 수 있습니다.아임웹은</div></div><div class="bookmark-href"><img src="https://vendor-cdn.imweb.me/images/main/imweb-favicon-192x192.png?v1" class="icon bookmark-icon"/>https://imweb.me/faq?mode=view&amp;category=29&amp;category2=38&amp;idx=71190</div></div><img src="https://vendor-cdn.imweb.me/images/main/newblue_imweb_og_logo.png?v1" class="bookmark-image"/></a></figure></div></div></figure></div><div style="display:contents" dir="auto"><p id="ff8a39f5-6235-42b9-826e-0204e5b20b3f" class="">
